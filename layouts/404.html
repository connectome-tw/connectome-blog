<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>頁面不存在 | Connectome</title>
</head>
<body>
  <div style="max-width: 600px; margin: 4rem auto; padding: 2rem; text-align: center;">
    <h1>頁面不存在</h1>
    <p id="message">正在重新導向...</p>
  </div>
  <script>
    (function() {
      var path = window.location.pathname.replace(/\/$/, '') || '/';
      var redirects = {{ .Site.Data.redirects | jsonify }};
      var termMatch = path.match(/^\/taxonomy\/term\/(\d+)$/);
      if (termMatch && redirects && redirects['taxonomy/term/' + termMatch[1]]) {
        window.location.replace(redirects['taxonomy/term/' + termMatch[1]]);
        return;
      }
      var nodeMatch = path.match(/^\/node\/(\d+)$/);
      if (nodeMatch && redirects && redirects[nodeMatch[1]]) {
        window.location.replace(redirects[nodeMatch[1]]);
        return;
      }
      document.getElementById('message').textContent = '5 秒後導向首頁...';
      setTimeout(function() { window.location.replace('/'); }, 5000);
    })();
  </script>
</body>
</html>

{{ $page := .Page }}
<div
    class="article-link--title-only py-3 border-b border-neutral-200 dark:border-neutral-700 last:border-0 hover:bg-neutral-50 dark:hover:bg-neutral-800/50 transition-colors px-2 -mx-2 rounded-lg">
    <header class="text-start">
        <a href="{{ $page.RelPermalink }}" class="not-prose group flex items-start gap-2">
            <h3
                class="text-base font-bold text-neutral-800 dark:text-neutral-200 group-hover:text-primary-600 dark:group-hover:text-primary-400 group-hover:underline decoration-primary-500 underline-offset-4 transition-all leading-snug">
                {{ $page.Title | emojify }}
            </h3>
        </a>
    </header>
</div>

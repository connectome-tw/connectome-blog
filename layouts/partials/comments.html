{{/* Giscus comments — add repo, repo-id, category-id when ready */}}
{{ with .Site.Params.giscus }}
  <script src="https://giscus.app/client.js"
    data-repo="{{ .repo }}"
    data-repo-id="{{ .repoId }}"
    data-category="{{ .category }}"
    data-category-id="{{ .categoryId }}"
    data-mapping="pathname"
    data-strict="0"
    data-reactions-enabled="1"
    data-emit-metadata="0"
    data-input-position="bottom"
    data-theme="preferred_color_scheme"
    data-lang="zh-TW"
    crossorigin="anonymous"
    async>
  </script>
  <div class="giscus mt-8"></div>
{{ else }}
  {{/* Placeholder until Giscus configured */}}
  <div class="mt-8 p-4 rounded-lg bg-neutral-100 dark:bg-neutral-800 text-neutral-500 dark:text-neutral-400 text-sm">
    留言功能（Giscus）需在 config 設定 giscus.repo, giscus.repoId, giscus.categoryId 後啟用。
  </div>
{{ end }}

# connectome.tw — Theme params
# https://blowfish.page/docs/configuration/

colorScheme = "blowfish"
defaultAppearance = "light"
autoSwitchAppearance = false
Logo = "logo.png"
disableTextInHeader = true

enableA11y = false
enableSearch = true  # Button visible; overridden with Pagefind for CJK
enableCodeCopy = false
enableStructuredBreadcrumbs = false

[header]
  layout = "fixed"  # Sticky header

[footer]
  showMenu = true
  showCopyright = true
  showThemeAttribution = true
  showAppearanceSwitcher = false
  showScrollToTop = true

[homepage]
  layout = "custom"  # Custom carousel + 2-col
  showRecent = false
  showRecentItems = 5
  showMoreLink = false
  showMoreLinkDest = "/posts/"
  cardView = false

[article]
  showDate = true
  showViews = false
  showLikes = false
  showDateOnlyInArticle = false
  showDateUpdated = false
  showAuthor = true
  showHero = true
  showBreadcrumbs = false
  showDraftLabel = true
  showEdit = false
  showHeadingAnchors = true
  showPagination = true
  showReadingTime = true
  showTableOfContents = false
  showRelatedContent = true
  relatedContentLimit = 3
  showTaxonomies = true
  showCategoryOnly = false
  showAuthorsBadges = true
  showWordCount = true
  sharingLinks = ["linkedin", "facebook", "threads", "line"]
  showComments = true
  showZenMode = false
